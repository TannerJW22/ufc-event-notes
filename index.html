<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>UFC Event Portfolio</title>
  <style>
    :root{--bg:#020202;--panel:#1B1B1A;--panel2:#23231f;--line:#37362f;--text:#F4F1EA;--muted:#b8afa1;--green:#2E9E5D;--red:#b64a53;--amber:#DDBA5A;--blue:#102A43;font-family:Bahnschrift,"Segoe UI",ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,sans-serif}
    *{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text)}button,input,select{font:inherit}button{cursor:pointer}.app{width:min(1440px,calc(100% - 28px));margin:0 auto;padding:18px 0 36px}.top{display:grid;grid-template-columns:minmax(280px,1fr) minmax(360px,auto);gap:18px;align-items:start;margin-bottom:18px}.eventTitleText{font-family:"Bahnschrift SemiCondensed",Bahnschrift,"Segoe UI",sans-serif;font-size:40px;line-height:.95;margin:0;color:var(--amber);letter-spacing:0}.topRight{display:grid;gap:10px;justify-items:end}.topControls{display:flex;gap:8px;justify-content:flex-end}.iconAction,.cardAction,.filterControl,.sortButton{border:1px solid var(--line);background:var(--panel2);color:var(--text);border-radius:8px;font-weight:800}.iconAction{width:58px;height:50px;display:inline-grid;place-items:center;padding:0}.iconAction.primary{background:rgba(221,186,90,.16);border-color:rgba(221,186,90,.72);color:var(--amber)}.iconAction:hover,.cardAction:hover,.filterControl:hover,.sortButton:hover{border-color:rgba(221,186,90,.78);color:var(--amber)}.iconAction svg{width:24px;height:24px;stroke:currentColor;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;fill:none}.filterPanel{display:flex;gap:8px;align-items:center;justify-content:flex-end;flex-wrap:wrap}.filterGroup{display:grid;gap:4px}.filterGroup label{color:var(--muted);font-size:10px;text-transform:uppercase;letter-spacing:.08em;font-weight:900}.filterControl{height:42px;min-width:118px;background:#11110f;padding:0 34px 0 12px;appearance:none;background-image:linear-gradient(45deg,transparent 50%,#F4F1EA 50%),linear-gradient(135deg,#F4F1EA 50%,transparent 50%);background-position:calc(100% - 17px) 18px,calc(100% - 11px) 18px;background-size:6px 6px,6px 6px;background-repeat:no-repeat}.sortGroup{display:flex;border:1px solid var(--line);border-radius:8px;overflow:hidden;background:#11110f;align-self:end}.sortButton{height:42px;border:0;border-right:1px solid var(--line);border-radius:0;background:transparent;color:var(--muted);padding:0 12px}.sortButton:last-child{border-right:0}.sortButton.active{background:rgba(221,186,90,.15);color:var(--amber)}.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:12px}.card{border:1px solid var(--line);background:linear-gradient(180deg,var(--panel2),var(--panel));border-radius:8px;padding:14px;min-height:206px;display:grid;grid-template-rows:auto 1fr auto;gap:12px}.card.current{border-color:rgba(221,186,90,.78);box-shadow:inset 3px 0 0 var(--amber)}.cardHeader{display:flex;justify-content:space-between;gap:12px;align-items:start}.card h2{font-size:25px;line-height:1;margin:0;color:var(--text);letter-spacing:0}.card.current h2{color:var(--amber)}.eventHeadline{display:block;color:var(--muted);font-size:16px;margin-top:5px}.badge{border:1px solid var(--line);border-radius:999px;color:var(--muted);padding:4px 8px;font-size:12px;font-weight:800;white-space:nowrap}.badge.current{border-color:rgba(221,186,90,.65);color:var(--amber)}.meta{display:grid;gap:7px;color:var(--muted);font-size:14px;line-height:1.2}.meta strong{color:var(--text);font-weight:800}.actions{display:flex;flex-wrap:wrap;gap:8px}.cardAction{display:inline-flex;text-decoration:none;align-items:center;justify-content:center;min-height:38px;padding:9px 13px}.empty{border:1px dashed var(--line);border-radius:8px;padding:28px;text-align:center;color:var(--muted);grid-column:1/-1}.modal{position:fixed;inset:0;background:rgba(0,0,0,.68);display:none;align-items:center;justify-content:center;padding:16px;z-index:20}.modal.open{display:flex}.dialog{width:min(560px,100%);background:var(--panel);border:1px solid var(--line);border-radius:8px;box-shadow:0 20px 70px rgba(0,0,0,.5)}.dialogHead{display:flex;justify-content:space-between;gap:10px;align-items:center;padding:14px 16px;border-bottom:1px solid var(--line)}.dialogHead h2{font-size:22px;margin:0;color:var(--amber)}.dialogBody{padding:16px;display:grid;gap:12px}.field{display:grid;gap:6px}.field label{font-size:12px;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);font-weight:800}.field input{border:1px solid var(--line);background:#11110f;color:var(--text);border-radius:8px;padding:11px 12px}.dialogActions{display:flex;justify-content:flex-end;gap:8px;padding:0 16px 16px}.closeIcon{width:34px;height:34px;border:1px solid var(--line);background:#11110f;color:var(--muted);border-radius:8px}.closeIcon:before{content:"x";font-weight:900}.status{min-height:18px;color:var(--muted);font-size:13px}@media(max-width:840px){.top{grid-template-columns:1fr}.topRight{justify-items:start}.filterPanel{justify-content:flex-start}.eventTitleText{font-size:34px}}@media(max-width:560px){.filterPanel{display:grid;grid-template-columns:1fr 1fr;width:100%}.filterControl,.sortGroup{width:100%;min-width:0}.sortGroup{grid-column:1/-1}.sortButton{flex:1}.iconAction{width:50px}.dialogActions{justify-content:stretch}.dialogActions .cardAction{flex:1}}
  </style>
  <style>
    .top{grid-template-columns:minmax(320px,1fr) auto;align-items:center}
    .topRight{display:flex;align-items:end;justify-content:flex-end;gap:10px;flex-wrap:wrap}
    .filterPanel{align-items:end;flex-wrap:nowrap}
    .iconAction[hidden]{display:none}
    .iconAction.danger{background:rgba(182,74,83,.22);border-color:rgba(182,74,83,.82);color:#ffc2c7}
    .iconAction.danger:hover{background:rgba(182,74,83,.34);border-color:#e46670;color:#fff}
    .cardLink{color:inherit;text-decoration:none;position:relative;transition:border-color .16s ease,background .16s ease,box-shadow .16s ease,transform .16s ease}
    .cardLink:hover,.cardLink:focus-visible{border-color:rgba(221,186,90,.86);background:linear-gradient(180deg,rgba(221,186,90,.12),var(--panel));box-shadow:inset 3px 0 0 var(--amber),0 12px 28px rgba(0,0,0,.28);outline:0;transform:translateY(-1px)}
    .cardLink:hover h2,.cardLink:focus-visible h2{color:var(--amber)}
    .card.selected{border-color:rgba(182,74,83,.9);box-shadow:inset 3px 0 0 var(--red),0 12px 28px rgba(0,0,0,.28)}
    .cardTitleRow{display:flex;gap:10px;align-items:flex-start}
    .eventCheck{display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;flex:0 0 auto;border-radius:8px;cursor:pointer}
    .eventCheck input{position:absolute;opacity:0;pointer-events:none}
    .eventCheckBox{width:24px;height:24px;border:1px solid rgba(221,186,90,.42);border-radius:7px;background:#11110f;display:inline-grid;place-items:center;box-shadow:inset 0 1px 0 rgba(255,255,255,.05);transition:background .16s ease,border-color .16s ease,box-shadow .16s ease}
    .eventCheckBox:after{content:"";width:10px;height:6px;border-left:3px solid #fff;border-bottom:3px solid #fff;transform:rotate(-45deg) scale(.75);opacity:0;transition:opacity .12s ease,transform .12s ease}
    .eventCheck input:focus-visible + .eventCheckBox{outline:2px solid rgba(221,186,90,.75);outline-offset:2px}
    .eventCheck input:checked + .eventCheckBox{background:var(--red);border-color:#e46670;box-shadow:0 0 0 3px rgba(182,74,83,.2)}
    .eventCheck input:checked + .eventCheckBox:after{opacity:1;transform:rotate(-45deg) scale(1)}
    @media(max-width:980px){.top{grid-template-columns:1fr}.topRight{justify-content:flex-start}.filterPanel{justify-content:flex-start}}
    @media(max-width:560px){.topRight{width:100%}.filterPanel{display:grid;grid-template-columns:1fr 1fr;width:100%}.topControls{width:100%;justify-content:flex-start}}
  </style>
</head>
<body>
  <main class="app">
    <section class="top">
      <div><h1 class="eventTitleText">UFC Event Portfolio</h1></div>
      <div class="topRight">
        <div class="topControls">
          <button class="iconAction primary" id="newBoard" title="New WarBoard" aria-label="New WarBoard"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 5v14"/><path d="M5 12h14"/></svg></button>
          <button class="iconAction danger" id="deleteSelected" title="Delete selected WarBoards" aria-label="Delete selected WarBoards" hidden><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 6h18"/><path d="M8 6V4h8v2"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v5"/><path d="M14 11v5"/></svg></button>
        </div>
        <div class="filterPanel" aria-label="Event filters and sorting">
          <div class="filterGroup"><select id="monthFilter" class="filterControl" aria-label="Filter by month"></select></div>
          <div class="filterGroup"><select id="yearFilter" class="filterControl" aria-label="Filter by year"></select></div>
          <div class="sortGroup" role="group" aria-label="Sort by date"><button type="button" class="sortButton active" data-sort="desc">Newest</button><button type="button" class="sortButton" data-sort="asc">Oldest</button></div>
        </div>
      </div>
    </section>
    <section class="grid" id="eventGrid"></section>
  </main>
  <div class="modal" id="boardModal" role="dialog" aria-modal="true" aria-labelledby="boardTitle"><form class="dialog" id="boardForm"><div class="dialogHead"><h2 id="boardTitle">New WarBoard</h2><button class="closeIcon" type="button" data-close title="Close" aria-label="Close"></button></div><div class="dialogBody"><div class="field"><label for="eventName">Event Name</label><input id="eventName" required value="{Event Name}" /></div><div class="field"><label for="eventHeadline">Headline</label><input id="eventHeadline" required value="{Fighter Name} vs. {Fighter Name}" /></div><div class="field"><label for="eventDate">Event Date</label><input id="eventDate" required value="{Event Date}" /></div><div class="field"><label for="eventLocation">Location</label><input id="eventLocation" required value="{Event Location}" /></div><div class="field"><label for="eventSlug">Page Slug</label><input id="eventSlug" required readonly value="{Event Date}" /></div><div class="status" id="modalStatus"></div></div><div class="dialogActions"><button class="cardAction" type="button" data-close>Cancel</button><button class="cardAction" type="submit">Download Page</button></div></form></div>
  <script>
    const builtInEvents = [
      {id:"14-Jun-2026",title:"UFC Freedom 250",headline:"Topuria vs. Gaethje",date:"Sunday Jun 14, 2026",location:"South Lawn of the White House, Washington, D.C.",href:"pages/14-Jun-2026.html",status:"current",type:"Published"},
      {id:"06-Jun-2026",title:"UFC Vegas 118",headline:"Muhammad vs. Bonfim",date:"Saturday Jun 6, 2026",location:"Las Vegas, Nevada",href:"pages/06-Jun-2026.html",status:"past",type:"Archive"}
    ];
    const state = {month:"all",year:"all",sort:"desc",selected:new Set()};
    const $ = s => document.querySelector(s), $$ = s => Array.from(document.querySelectorAll(s));
    const esc = s => String(s ?? "").replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    const jsString = s => String(s ?? "").replace(/\\/g,"\\\\").replace(/"/g,'\\"');
    const slugify = value => String(value || "new-ufc-warboard").toLowerCase().replace(/[^a-z0-9]+/g,"-").replace(/^-+|-+$/g,"") || "new-ufc-warboard";
    const monthNames = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
    const parseEventDate = value => {
      const cleaned = String(value || "").replace(/^(Monday|Tuesday|Wednesday|Thursday|Friday|Saturday|Sunday)\s+/i,"").trim();
      const date = new Date(cleaned);
      return Number.isNaN(date.getTime()) ? null : date;
    };
    const dateSlug = value => {
      const date = parseEventDate(value);
      if(date) return `${String(date.getDate()).padStart(2,"0")}-${monthNames[date.getMonth()]}-${date.getFullYear()}`;
      return slugify(value);
    };
    const eventDateMeta = event => {
      const date = parseEventDate(event.date);
      return date ? {date,month:String(date.getMonth() + 1),year:String(date.getFullYear())} : {date:null,month:"unknown",year:"unknown"};
    };
    function populateFilters(){
      const metas = builtInEvents.map(eventDateMeta);
      const monthOptions = [...new Set(metas.map(meta=>meta.month).filter(x=>x !== "unknown"))].sort((a,b)=>Number(a)-Number(b));
      const yearOptions = [...new Set(metas.map(meta=>meta.year).filter(x=>x !== "unknown"))].sort((a,b)=>Number(b)-Number(a));
      if(state.month !== "all" && !monthOptions.includes(state.month)) state.month = "all";
      if(state.year !== "all" && !yearOptions.includes(state.year)) state.year = "all";
      $("#monthFilter").innerHTML = '<option value="all">All Months</option>' + monthOptions.map(value=>`<option value="${value}">${monthNames[Number(value)-1]}</option>`).join("");
      $("#yearFilter").innerHTML = '<option value="all">All Years</option>' + yearOptions.map(value=>`<option value="${value}">${value}</option>`).join("");
      $("#monthFilter").value = state.month;
      $("#yearFilter").value = state.year;
    }
    function card(event){
      const badgeClass = event.status === "current" ? "badge current" : "badge";
      const selected = state.selected.has(event.id);
      let html = '<article class="card cardLink ' + (event.status === "current" ? "current " : "") + (selected ? "selected" : "") + '" data-id="' + esc(event.id) + '" data-href="' + esc(event.href || '#') + '" role="link" tabindex="0" aria-label="Open ' + esc(event.title) + '">';
      html += '<div class="cardHeader"><div class="cardTitleRow"><label class="eventCheck" title="Select WarBoard"><input type="checkbox" class="eventSelect" data-id="' + esc(event.id) + '" aria-label="Select ' + esc(event.title) + '"' + (selected ? " checked" : "") + '><span class="eventCheckBox" aria-hidden="true"></span></label><div><h2>' + esc(event.title) + '</h2><span class="eventHeadline">' + esc(event.headline) + '</span></div></div><span class="' + badgeClass + '">' + esc(event.type || event.status) + '</span></div>';
      html += '<div class="meta"><div><strong>Date</strong> ' + esc(event.date) + '</div><div><strong>Location</strong> ' + esc(event.location) + '</div></div>';
      return html + '</article>';
    }
    function render(){
      const items = builtInEvents
        .filter(event => {
          const meta = eventDateMeta(event);
          return (state.month === "all" || meta.month === state.month) && (state.year === "all" || meta.year === state.year);
        })
        .sort((a,b) => {
          const ad = eventDateMeta(a).date?.getTime() || 0;
          const bd = eventDateMeta(b).date?.getTime() || 0;
          return state.sort === "asc" ? ad - bd : bd - ad;
        });
      $("#eventGrid").innerHTML = items.length ? items.map(card).join("") : '<div class="empty">No events match this view.</div>';
      updateDeleteButton();
    }
    function updateDeleteButton(){
      const count = state.selected.size;
      const button = $("#deleteSelected");
      button.hidden = count === 0;
      button.title = count === 1 ? "Delete selected WarBoard" : `Delete ${count} selected WarBoards`;
      button.setAttribute("aria-label", button.title);
    }
    function selectedEvents(){
      return builtInEvents.filter(event => state.selected.has(event.id));
    }
    function removeEventsFromView(ids){
      for(const id of ids){
        const index = builtInEvents.findIndex(event => event.id === id);
        if(index > -1) builtInEvents.splice(index, 1);
        state.selected.delete(id);
      }
      populateFilters();
      render();
    }
    function pageFileName(event){
      const href = String(event.href || "").replace(/^\.?\//, "");
      if(!href.startsWith("pages/") || !href.endsWith(".html") || href.includes("..")) return "";
      return href.slice("pages/".length);
    }
    function serializeEvents(events){
      return 'const builtInEvents = [\n' + events.map(event => '      ' + JSON.stringify(event)).join(',\n') + '\n    ];';
    }
    function replaceBuiltInEventsSource(source, events){
      const start = source.indexOf("const builtInEvents = [");
      if(start < 0) throw new Error("Unable to find builtInEvents in index.html.");
      const open = source.indexOf("[", start);
      let depth = 0, quote = "", escaped = false;
      for(let i = open; i < source.length; i++){
        const ch = source[i];
        if(quote){
          if(escaped){ escaped = false; continue; }
          if(ch === "\\"){ escaped = true; continue; }
          if(ch === quote) quote = "";
          continue;
        }
        if(ch === '"' || ch === "'" || ch === "`"){ quote = ch; continue; }
        if(ch === "[") depth++;
        if(ch === "]"){
          depth--;
          if(depth === 0){
            const semi = source.indexOf(";", i);
            if(semi < 0) throw new Error("Unable to finish builtInEvents replacement.");
            return source.slice(0, start) + serializeEvents(events) + source.slice(semi + 1);
          }
        }
      }
      throw new Error("Unable to parse builtInEvents in index.html.");
    }
    async function persistDeletion(events){
      if(!window.showDirectoryPicker) throw new Error("This browser cannot permanently delete local files from a static page. Use Chrome or Edge and open the local/GitHub Pages URL.");
      const remaining = builtInEvents.filter(event => !state.selected.has(event.id));
      const root = await window.showDirectoryPicker({mode:"readwrite"});
      const indexHandle = await root.getFileHandle("index.html");
      const indexText = await (await indexHandle.getFile()).text();
      const nextIndex = replaceBuiltInEventsSource(indexText, remaining);
      const writable = await indexHandle.createWritable();
      await writable.write(nextIndex);
      await writable.close();
      const removed = [];
      const pagesDir = await root.getDirectoryHandle("pages");
      for(const event of events){
        const fileName = pageFileName(event);
        if(!fileName) continue;
        try{
          await pagesDir.removeEntry(fileName);
          removed.push(fileName);
        }catch(error){
          if(error.name !== "NotFoundError") throw error;
        }
      }
      return removed;
    }
    async function deleteSelectedEvents(){
      const events = selectedEvents();
      if(!events.length) return;
      const ids = events.map(event => event.id);
      const names = events.map(event => event.title).join(", ");
      const confirmed = window.confirm(`Permanently delete ${events.length} selected WarBoard page${events.length === 1 ? "" : "s"}?\n\n${names}\n\nThis will update index.html and remove the matching page file${events.length === 1 ? "" : "s"} from the local folder you authorize next. This cannot be undone.`);
      if(!confirmed) return;
      try{
        const removed = await persistDeletion(events);
        removeEventsFromView(ids);
        window.alert(`Deleted ${events.length} WarBoard${events.length === 1 ? "" : "s"} from this homepage and removed ${removed.length} page file${removed.length === 1 ? "" : "s"} from the selected folder.\n\nCommit and push those local changes to update GitHub Pages.`);
      }catch(error){
        window.alert(error.message || "Unable to delete the selected WarBoard pages.");
      }
    }
    async function loadTemplate(){ const response = await fetch('template.html', {cache:'no-store'}); if(!response.ok) throw new Error('Template unavailable'); return response.text(); }
    function customizeTemplate(html, event){
      let out = html;
      out = out.replace(/<title>.*?<\/title>/, '<title>UFC Event Portfolio | ' + esc(event.title) + '</title>');
      out = out.replace(/<span class="eventTitleText" id="eventTitle">\{Event Name\}<\/span><span class="eventHeadline" id="eventHeadline">\{Fighter Name\} vs\. \{Fighter Name\}<\/span>/g, '<span class="eventTitleText" id="eventTitle">' + esc(event.title) + '</span><span class="eventHeadline" id="eventHeadline">' + esc(event.headline) + '</span>');
      out = out.replace(/{Event Name}/g, jsString(event.title)).replace(/{Event Date}/g, jsString(event.date)).replace(/{Event Location}/g, jsString(event.location));
      return out;
    }
    function downloadHtml(html, filename){ const blob = new Blob([html], {type:'text/html'}); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = filename; document.body.appendChild(a); a.click(); a.remove(); setTimeout(() => URL.revokeObjectURL(a.href), 1000); }
    function closeModal(){ $("#boardModal").classList.remove("open"); $("#modalStatus").textContent = ""; }
    $("#newBoard").onclick = () => $("#boardModal").classList.add("open");
    $("#deleteSelected").onclick = deleteSelectedEvents;
    $$('[data-close]').forEach(button => button.onclick = closeModal);
    $("#boardModal").addEventListener('click', event => { if(event.target.id === 'boardModal') closeModal(); });
    $("#eventGrid").addEventListener('change', event => {
      if(!event.target.classList.contains("eventSelect")) return;
      const id = event.target.dataset.id;
      if(event.target.checked) state.selected.add(id);
      else state.selected.delete(id);
      const card = event.target.closest(".card");
      if(card) card.classList.toggle("selected", event.target.checked);
      updateDeleteButton();
    });
    $("#eventGrid").addEventListener('click', event => {
      if(event.target.closest(".eventCheck")) return;
      const card = event.target.closest(".card[data-href]");
      if(card) window.location.href = card.dataset.href;
    });
    $("#eventGrid").addEventListener('keydown', event => {
      if(event.target.closest(".eventCheck")) return;
      if(event.key !== "Enter" && event.key !== " ") return;
      const card = event.target.closest(".card[data-href]");
      if(!card) return;
      event.preventDefault();
      window.location.href = card.dataset.href;
    });
    $("#eventDate").addEventListener('input', event => { $("#eventSlug").value = dateSlug(event.target.value); });
    $("#monthFilter").onchange = event => { state.month = event.target.value; render(); };
    $("#yearFilter").onchange = event => { state.year = event.target.value; render(); };
    $$('[data-sort]').forEach(button => button.onclick = () => { state.sort = button.dataset.sort; $$('[data-sort]').forEach(b => b.classList.toggle('active', b === button)); render(); });
    $("#boardForm").onsubmit = async event => {
      event.preventDefault();
      const data = {id:dateSlug($("#eventDate").value),title:$("#eventName").value.trim(),headline:$("#eventHeadline").value.trim(),date:$("#eventDate").value.trim(),location:$("#eventLocation").value.trim()};
      $("#eventSlug").value = data.id;
      try{ const html = customizeTemplate(await loadTemplate(), data); closeModal(); downloadHtml(html, data.id + '.html'); }
      catch(error){ $("#modalStatus").textContent = error.message || "Unable to create WarBoard."; }
    };
    populateFilters();
    render();
  </script>
</body>
</html>
